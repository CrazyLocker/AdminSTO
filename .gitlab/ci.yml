# ============================================================
# CI/CD ДЛЯ ADM INSTO (GITVERSE)
# ============================================================

image: openjdk:21-jdk

stages:
  - build
  - test
  - package
  - deploy

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  paths:
    - .gradle/wrapper
    - .gradle/caches

# ====== 1. СБОРКА ======
build:
  stage: build
  script:
    - chmod +x gradlew
    - ./gradlew compileJava
  artifacts:
    paths:
      - build/classes/
  only:
    - main
    - develop
    - merge_requests

# ====== 2. ТЕСТЫ ======
test:
  stage: test
  script:
    - chmod +x gradlew
    - ./gradlew test
  artifacts:
    reports:
      junit:
        - build/test-results/test/**/TEST-*.xml
  only:
    - main
    - develop
    - merge_requests

# ====== 3. УПАКОВКА (FAT JAR) ======
package:
  stage: package
  script:
    - chmod +x gradlew
    - ./gradlew fatJar
  artifacts:
    paths:
      - build/libs/*.jar
    name: "AdminSTO-$CI_COMMIT_SHORT_SHA"
  only:
    - main
    - tags

# ====== 4. ПОРТАТИВНАЯ ВЕРСИЯ (опционально) ======
portable:
  stage: package
  script:
    - chmod +x gradlew
    - ./gradlew dist
  artifacts:
    paths:
      - dist/
    name: "AdminSTO-Portable-$CI_COMMIT_SHORT_SHA"
  only:
    - tags
  when: manual