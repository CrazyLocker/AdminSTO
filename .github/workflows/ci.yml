# .github/workflows/ci.yml
name: AdminSTO Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew clean fatJar --stacktrace

      # ==========================================
      # ШАГ СКАЧИВАНИЯ JAVAFX УДАЛЁН!
      # Теперь скрипт build-portable.ps1 сам найдёт JavaFX в репозитории
      # ==========================================

      - name: Build portable version
        shell: pwsh
        run: |
          Write-Host "Building portable version..."
          .\build-portable.ps1

      - name: Package portable version
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $ZIP_NAME = "AdminSTO-portable-${TAG}.zip"
          Write-Host "Creating ZIP: $ZIP_NAME"
          Compress-Archive -Path "AdminSTO_Portable\*" -DestinationPath $ZIP_NAME -Force
          Write-Host "ZIP created successfully."
          Write-Output "ZIP_FILE=$ZIP_NAME" >> $env:GITHUB_ENV

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-Portable-${{ github.ref_name }}
          path: ${{ env.ZIP_FILE }}
          retention-days: 30

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          name: AdminSTO ${{ github.ref_name }}
          body: "Автономная версия AdminSTO ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: ${{ env.ZIP_FILE }}