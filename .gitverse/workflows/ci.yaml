# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Формат: GitHub Actions совместимый
# ============================================================

name: AdminSTO Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  release:
    types: [published]

jobs:
  build-and-test:
    name: Сборка и тесты
    runs-on: ubuntu-latest

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем версию Java
        run: java -version

      - name: Устанавливаем Xvfb для headless-рендеринга
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Обновляем зависимости
        run: ./gradlew dependencies --stacktrace

      - name: Запускаем тесты
        # Headless-параметры уже есть в build.gradle (systemProperty + jvmArgs)
        # Xvfb создаёт виртуальный дисплей для JavaFX
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2
          ./gradlew test --stacktrace

      - name: Сохраняем результаты тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/test-results/test/

  package:
    name: Создание JAR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      - name: Сохраняем JAR
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-JAR
          path: build/libs/*.jar

  release:
    name: Создание релиза
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Скачиваем артефакты JAR
        uses: actions/download-artifact@v4
        with:
          name: AdminSTO-JAR
          path: build/libs

      - name: Создаём ZIP для релиза
        run: |
          cd build/libs
          zip -r ../AdminSTO-${{ github.ref_name }}.zip *.jar
          cd ..

      - name: Создаём релиз
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AdminSTO-${{ github.ref_name }}.zip
          name: Релиз ${{ github.ref_name }}
          draft: false
          prerelease: false