# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Официальный API: https://api.gitverse.ru
# Запуск только по тегам v*
# Сборка Windows-портативки на Ubuntu-раннере
# ============================================================

name: AdminSTO Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Сборка и релиз
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. Клонируем репозиторий
      # ==========================================
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "repository: ${{ github.repository }}"

      # ==========================================
      # 2. Настройка JDK 21
      # ==========================================
      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем Java
        run: java -version

      # ==========================================
      # 3. Кэширование Gradle
      # ==========================================
      - name: Кэшируем Gradle
        uses: actions/cache@v4
        id: gradle-cache
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ==========================================
      # 4. Сборка проекта
      # ==========================================
      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      # ==========================================
      # 5. Установка PowerShell для запуска build-portable.ps1
      # ==========================================
      - name: Устанавливаем PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh -version

      # ==========================================
      # 6. Создание портативки (Windows)
      # ==========================================
      - name: Создаём portable-версию
        run: |
          echo "=== Создание portable-версии ==="
          if [ ! -f "build/libs/autoservice-admin.jar" ]; then
            echo "JAR не найден!"
            exit 1
          fi
          pwsh -File ./build-portable.ps1

      - name: Проверяем portable-версию
        run: |
          echo "=== Содержимое AdminSTO_Portable ==="
          ls -la AdminSTO_Portable
          SIZE=$(du -sh AdminSTO_Portable | cut -f1)
          echo "Размер: $SIZE"

      # ==========================================
      # 7. Упаковка в ZIP
      # ==========================================
      - name: Упаковываем портативку в ZIP
        run: |
          TAG="${{ github.ref_name }}"
          ZIP_NAME="AdminSTO-portable-${TAG}.zip"
          
          echo "=== Упаковка ==="
          if [ ! -d "AdminSTO_Portable" ]; then
            echo "Папка AdminSTO_Portable не найдена!"
            exit 1
          fi
          
          zip -r -9 "$ZIP_NAME" AdminSTO_Portable/
          SIZE=$(du -sh "$ZIP_NAME" | cut -f1)
          echo "✅ ZIP создан: $ZIP_NAME ($SIZE)"
          echo "ZIP_FILE=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_SIZE=$SIZE" >> $GITHUB_ENV

      # ==========================================
      # 8. Создание релиза и загрузка ZIP
      # ==========================================
      - name: Создаём релиз
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          OWNER="dez21"
          REPO="AdminSTO"
          
          API_URL="https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases"
          
          echo "=== Создание релиза ==="
          echo "Тег: ${TAG}"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API_URL" \
            -H "Authorization: Bearer ${SECRETTOKEN}" \
            -H "Accept: application/vnd.gitverse.object+json;version=1" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"AdminSTO ${TAG}\",
              \"body\": \"Автономная версия AdminSTO ${TAG}\",
              \"draft\": false,
              \"prerelease\": false
            }")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          JSON=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Ошибка создания релиза: $HTTP_CODE"
            echo "$JSON"
            exit 1
          fi
          
          RELEASE_ID=$(echo "$JSON" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          RELEASE_URL=$(echo "$JSON" | python3 -c "import sys, json; print(json.load(sys.stdin)['html_url'])")
          
          echo "✅ Релиз создан!"
          echo "ID: $RELEASE_ID"
          echo "URL: $RELEASE_URL"
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV
          echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV

      # ==========================================
      # 9. Загрузка ZIP с повторными попытками
      # ==========================================
      - name: Загружаем ZIP с повторными попытками
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="$ZIP_FILE"
          OWNER="dez21"
          REPO="AdminSTO"
          RELEASE_ID="$RELEASE_ID"
          
          echo "=== Загрузка ZIP с повторными попытками ==="
          echo "Тег: ${TAG}"
          echo "Файл: ${ZIP} ($ZIP_SIZE)"
          echo "ID релиза: ${RELEASE_ID}"
          
          if [ ! -f "$ZIP" ]; then
            echo "ZIP не найден: $ZIP"
            exit 1
          fi
          
          ASSET_URL="https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/assets"
          
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Попытка ${RETRY_COUNT}/${MAX_RETRIES}..."
            
            # Отправляем файл как бинарные данные с правильным Content-Type
            HTTP_CODE=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" -X POST "$ASSET_URL" \
              -H "Authorization: Bearer ${SECRETTOKEN}" \
              -H "Accept: application/vnd.gitverse.object+json;version=1" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${ZIP}" \
              --max-time 120 \
              2>&1)
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "202" ]; then
              echo "✅ ZIP загружен успешно! HTTP $HTTP_CODE"
              echo "Response: $(cat /tmp/upload_response.txt)"
              SUCCESS=true
            else
              echo "⚠️ Попытка ${RETRY_COUNT} не удалась: HTTP $HTTP_CODE"
              echo "Response: $(cat /tmp/upload_response.txt)"
              
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                WAIT_TIME=$((RETRY_COUNT * 5))
                echo "Ожидание ${WAIT_TIME} секунд перед повторной попыткой..."
                sleep $WAIT_TIME
              fi
            fi
          done
          
          if [ "$SUCCESS" = false ]; then
            echo "❌ Не удалось загрузить ZIP после ${MAX_RETRIES} попыток"
            echo ""
            echo "⚠️ Релиз создан, но файл не загружен."
            echo "Загрузите файл вручную на странице релиза:"
            echo "$RELEASE_URL"
            exit 1
          fi
          
          echo ""
          echo "✅ Релиз готов!"
          echo "🔗 $RELEASE_URL"

      # ==========================================
      # 10. Информация о завершении
      # ==========================================
      - name: Завершение сборки
        run: |
          echo "=== Сборка завершена ==="
          echo "Тег: ${{ github.ref_name }}"
          if [ -n "$RELEASE_URL" ]; then
            echo "✅ Релиз создан: $RELEASE_URL"
          else
            echo "❌ Релиз не создан!"
            exit 1
          fi