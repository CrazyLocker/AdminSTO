# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# ============================================================

name: AdminSTO Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Сборка проекта
    runs-on: ubuntu-latest

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка переменных GitVerse
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.ref_type: ${{ github.ref_type }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.sha: ${{ github.sha }}"
          echo "github.repository: ${{ github.repository }}"
          echo "github.server_url: ${{ github.server_url }}"

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем версию Java
        run: java -version

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      - name: Проверяем JAR
        run: |
          echo "=== Результаты сборки JAR ==="
          ls -lh build/libs/*.jar 2>/dev/null || echo "JAR не найден"
          du -sh build/libs/*.jar 2>/dev/null || true

      - name: Создаём portable-версию
        run: |
          chmod +x build-portable.sh
          ./build-portable.sh

      - name: Создаём ZIP для релиза
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd AdminSTO_Portable
          zip -r ../AdminSTO-portable-${{ github.ref_name }}.zip .
          cd ..
          echo "=== ZIP создан ==="
          ls -lh AdminSTO-portable-*.zip

      - name: Проверяем portable-версию
        run: |
          echo "=== Portable версия ==="
          ls -lh AdminSTO_Portable/
          echo "Размер папки:"
          du -sh AdminSTO_Portable/
          echo "Файл запуска:"
          ls -lh AdminSTO_Portable/run.sh

      - name: Сохраняем артефакты
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-Portable
          path: AdminSTO_Portable/

      - name: Сохраняем ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-ZIP
          path: AdminSTO-portable-*.zip

  release:
    name: Создание релиза
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref_name, 'v')
    permissions:
      contents: write

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Скачиваем ZIP артефакт
        uses: actions/download-artifact@v4
        with:
          name: AdminSTO-ZIP
          path: .

      - name: Проверяем ZIP файл
        run: |
          echo "=== Найденные ZIP файлы ==="
          ls -lh *.zip || echo "ZIP не найден"

      - name: Создаём релиз через GitVerse API
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        run: |
          set -e
          
          TAG="${{ github.ref_name }}"
          ZIP="AdminSTO-portable-${TAG}.zip"
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
          
          # Правильный URL для GitVerse API (v1)
          API_URL="https://gitverse.ru/api/v1/repos/${OWNER}/${REPO}"
          
          echo "=== Создание релиза через GitVerse API ==="
          echo "Тег: ${TAG}"
          echo "Файл: ${ZIP}"
          echo "API URL: ${API_URL}"
          echo "Репозиторий: ${OWNER}/${REPO}"
          echo "Токен установлен: $([ -n "$SECRETTOKEN" ] && echo "Да" || echo "Нет")"
          
          # Проверяем существование ZIP файла
          if [ ! -f "${ZIP}" ]; then
            echo "❌ ZIP файл не найден: ${ZIP}"
            ls -lh *.zip || echo "Нет ZIP файлов"
            exit 1
          fi
          
          echo "✅ ZIP файл найден: $(ls -lh ${ZIP})"
          
          # 1. Создаём релиз
          echo "Создаём релиз..."
          RESPONSE=$(curl -s -X POST "${API_URL}/releases" \
            -H "Authorization: token ${SECRETTOKEN}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Релиз ${TAG}\",
              \"body\": \"Автономная версия AdminSTO ${TAG}\",
              \"draft\": false,
              \"prerelease\": false
            }")
          
          echo "Ответ API: ${RESPONSE}"
          
          # Проверяем ответ
          if echo "${RESPONSE}" | grep -q '"error"'; then
            echo "❌ Ошибка создания релиза!"
            echo "${RESPONSE}"
            exit 1
          fi
          
          # Извлекаем ID релиза
          RELEASE_ID=$(echo "${RESPONSE}" | grep -o '"id": [0-9]*' | head -1 | awk -F': ' '{print $2}' | tr -d ' ')
          
          if [ -z "${RELEASE_ID}" ]; then
            echo "❌ Не удалось получить ID релиза!"
            echo "Ответ: ${RESPONSE}"
            exit 1
          fi
          
          echo "✅ Релиз создан с ID: ${RELEASE_ID}"
          
          # 2. Загружаем файл
          echo "Загружаем ZIP файл в релиз..."
          
          UPLOAD_RESPONSE=$(curl -s -X POST "${API_URL}/releases/${RELEASE_ID}/assets" \
            -H "Authorization: token ${SECRETTOKEN}" \
            -H "Accept: application/json" \
            -H "Content-Type: multipart/form-data" \
            -F "attachment=@${ZIP}")
          
          echo "Ответ загрузки: ${UPLOAD_RESPONSE}"
          
          if echo "${UPLOAD_RESPONSE}" | grep -q '"error"'; then
            echo "❌ Ошибка загрузки файла!"
            echo "${UPLOAD_RESPONSE}"
            exit 1
          fi
          
          echo "✅ Релиз успешно создан!"
          echo "🔗 https://gitverse.ru/${OWNER}/${REPO}/releases/tag/${TAG}"

      - name: Альтернативный метод (если API не работает)
        if: failure()
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        run: |
          set -e
          
          TAG="${{ github.ref_name }}"
          ZIP="AdminSTO-portable-${TAG}.zip"
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
          
          echo "=== Альтернативный метод создания релиза ==="
          
          # Пробуем использовать другой эндпоинт
          API_URL="https://gitverse.ru/api/v3/repos/${OWNER}/${REPO}"
          echo "Пробуем API v3: ${API_URL}"
          
          RESPONSE=$(curl -s -X POST "${API_URL}/releases" \
            -H "Authorization: token ${SECRETTOKEN}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Релиз ${TAG}\",
              \"body\": \"Автономная версия AdminSTO ${TAG}\"
            }")
          
          echo "Ответ API v3: ${RESPONSE}"