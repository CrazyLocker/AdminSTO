# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Формат: GitHub Actions совместимый
# GHES (GitHub Enterprise Server) не поддерживает upload/download artifact
# Тесты запускаются только локально — в Actions только сборка
# Релизы создаются через GitHub CLI (gh)
# ============================================================

name: AdminSTO Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Сборка проекта
    runs-on: ubuntu-latest

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка переменных GitVerse
        run: |
          echo "github.ref: ${{ github.ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.ref_type: ${{ github.ref_type }}"
          echo "github.event_name: ${{ github.event_name }}"
          echo "github.sha: ${{ github.sha }}"

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем версию Java
        run: java -version

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      - name: Проверяем JAR
        run: |
          echo "=== Результаты сборки JAR ==="
          ls -lh build/libs/*.jar 2>/dev/null || echo "JAR не найден"
          du -sh build/libs/*.jar 2>/dev/null || true

      - name: Создаём portable-версию
        run: |
          chmod +x build-portable.sh
          ./build-portable.sh

      - name: Создаём ZIP для релиза
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd AdminSTO_Portable
          zip -r ../AdminSTO-portable-${{ github.ref_name }}.zip .
          cd ..
          echo "=== ZIP создан ==="
          ls -lh AdminSTO-portable-*.zip

      - name: Проверяем portable-версию
        run: |
          echo "=== Portable версия ==="
          ls -lh AdminSTO_Portable/
          echo "Размер папки:"
          du -sh AdminSTO_Portable/
          echo "Файл запуска:"
          ls -lh AdminSTO_Portable/run.sh

  release:
    name: Создание релиза
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref_name, 'v')
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      - name: Создаём portable-версию
        run: |
          chmod +x build-portable.sh
          ./build-portable.sh

      - name: Создаём ZIP
        run: |
          cd AdminSTO_Portable
          zip -r ../AdminSTO-portable-${{ github.ref_name }}.zip .
          cd ..

      - name: Создаём релиз через API
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          ZIP="AdminSTO-portable-${TAG}.zip"
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
          API_URL="${{ github.server_url }}/api/v3/repos/$OWNER/$REPO"
          
          echo "=== Создание релиза ==="
          echo "Тег: $TAG"
          echo "Файл: $ZIP"
          
          # 1. Создаём релиз
          RESPONSE=$(curl -s -X POST "$API_URL/releases" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"Релиз $TAG\",
              \"body\": \"Автономная версия AdminSTO $TAG\",
              \"draft\": false,
              \"prerelease\": false
            }")
          
          echo "Ответ API: $RESPONSE"
          
          UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url": "[^"]*' | cut -d'"' -f4 | cut -d'{' -f1)
          
          if [ -z "$UPLOAD_URL" ]; then
            echo "❌ Ошибка создания релиза!"
            exit 1
          fi
          
          echo "Загружаем ZIP в релиз..."
          curl -s -X POST "$UPLOAD_URL?name=$ZIP" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @"$ZIP"
          
          echo "✅ Релиз успешно создан!"