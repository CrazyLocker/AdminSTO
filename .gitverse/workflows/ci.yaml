# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Формат: GitHub Actions совместимый
# GHES (GitHub Enterprise Server) не поддерживает upload/download artifact
# ============================================================

name: AdminSTO Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Сборка и тесты
    runs-on: ubuntu-latest

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем версию Java
        run: java -version

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Запускаем тесты
        # UI-тесты исключены из задачи test (build.gradle)
        # Они нестабильны в CI/CD — запускаются отдельно
        run: ./gradlew test --stacktrace

      - name: Проверяем результаты тестов
        if: always()
        run: |
          echo "=== Результаты тестов ==="
          if [ -d "build/test-results/test" ]; then
            ls -la build/test-results/test/
            echo "Файлов тестов: $(ls build/test-results/test/*.xml 2>/dev/null | wc -l)"
          else
            echo "Директория результатов тестов не найдена"
          fi

  package:
    name: Создание JAR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      - name: Проверяем JAR
        run: |
          echo "=== Результаты сборки JAR ==="
          ls -lh build/libs/*.jar 2>/dev/null || echo "JAR не найден"
          du -sh build/libs/*.jar 2>/dev/null || true