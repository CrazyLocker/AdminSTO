# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# ============================================================

name: AdminSTO Build

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Сборка проекта
    runs-on: ubuntu-latest

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка переменных
        run: |
          echo "ref: ${{ github.ref }}"
          echo "ref_name: ${{ github.ref_name }}"
          echo "ref_type: ${{ github.ref_type }}"
          echo "event_name: ${{ github.event_name }}"
          echo "repository: ${{ github.repository }}"

      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      - name: Создаём portable-версию
        run: |
          chmod +x build-portable.sh
          ./build-portable.sh

      - name: Создаём ZIP для релиза
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd AdminSTO_Portable
          zip -r ../AdminSTO-portable-${{ github.ref_name }}.zip .
          cd ..
          echo "=== ZIP создан ==="
          ls -lh AdminSTO-portable-*.zip
          # Сохраняем имя ZIP файла в переменную окружения
          echo "ZIP_FILE=AdminSTO-portable-${{ github.ref_name }}.zip" >> $GITHUB_ENV

      - name: Создаём релиз (если это тег)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        run: |
          set -e
          
          TAG="${{ github.ref_name }}"
          ZIP="${ZIP_FILE}"
          OWNER="dez21"
          REPO="AdminSTO"
          
          echo "=== Создание релиза ==="
          echo "Тег: ${TAG}"
          echo "Файл: ${ZIP}"
          echo "Токен установлен: $([ -n "$SECRETTOKEN" ] && echo "Да" || echo "Нет")"
          
          # Проверяем ZIP
          if [ ! -f "${ZIP}" ]; then
            echo "❌ ZIP не найден: ${ZIP}"
            ls -lh *.zip || echo "Нет ZIP файлов"
            exit 1
          fi
          
          echo "✅ ZIP найден: $(ls -lh ${ZIP})"
          
          # Пробуем разные варианты API
          echo "=== Пробуем API эндпоинты ==="
          
          # Вариант 1: API v4 (GitLab стиль)
          API_URL="https://gitverse.ru/api/v4/projects/${OWNER}%2F${REPO}"
          echo "Пробуем API v4: ${API_URL}"
          
          RESPONSE=$(curl -s -X POST "${API_URL}/releases" \
            -H "Authorization: Bearer ${SECRETTOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Релиз ${TAG}\",
              \"description\": \"Автономная версия AdminSTO ${TAG}\"
            }")
          
          echo "Ответ v4: ${RESPONSE}"
          
          if echo "${RESPONSE}" | grep -q '"id"'; then
            RELEASE_ID=$(echo "${RESPONSE}" | grep -o '"id": [0-9]*' | head -1 | awk -F': ' '{print $2}' | tr -d ' ')
            echo "✅ Релиз создан через v4! ID: ${RELEASE_ID}"
          
            # Загружаем файл
            echo "Загружаем файл..."
            UPLOAD_RESPONSE=$(curl -s -X POST "${API_URL}/releases/${RELEASE_ID}/assets" \
              -H "Authorization: Bearer ${SECRETTOKEN}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@${ZIP}")
          
            echo "Загрузка: ${UPLOAD_RESPONSE}"
            echo "✅ Релиз создан!"
            echo "🔗 https://gitverse.ru/${OWNER}/${REPO}/releases/tag/${TAG}"
            exit 0
          fi
          
          # Вариант 2: API v3 (GitHub стиль)
          echo "Пробуем API v3..."
          API_URL="https://gitverse.ru/api/v3/repos/${OWNER}/${REPO}"
          
          RESPONSE=$(curl -s -X POST "${API_URL}/releases" \
            -H "Authorization: token ${SECRETTOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Релиз ${TAG}\",
              \"body\": \"Автономная версия AdminSTO ${TAG}\"
            }")
          
          echo "Ответ v3: ${RESPONSE}"
          
          if echo "${RESPONSE}" | grep -q '"id"'; then
            UPLOAD_URL=$(echo "${RESPONSE}" | grep -o '"upload_url": "[^"]*' | cut -d'"' -f4 | cut -d'{' -f1)
            if [ -n "${UPLOAD_URL}" ]; then
              echo "Загружаем файл..."
              curl -s -X POST "${UPLOAD_URL}?name=${ZIP}" \
                -H "Authorization: token ${SECRETTOKEN}" \
                -H "Content-Type: application/zip" \
                --data-binary @"${ZIP}"
              echo "✅ Релиз создан!"
              echo "🔗 https://gitverse.ru/${OWNER}/${REPO}/releases/tag/${TAG}"
              exit 0
            fi
          fi
          
          # Вариант 3: Простой curl
          echo "Пробуем простой эндпоинт..."
          API_URL="https://gitverse.ru/api/v1/repos/${OWNER}/${REPO}/releases"
          
          RESPONSE=$(curl -s -X POST "${API_URL}" \
            -H "Authorization: token ${SECRETTOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Релиз ${TAG}\"
            }")
          
          echo "Ответ: ${RESPONSE}"
          
          echo "❌ Не удалось создать релиз!"
          exit 1