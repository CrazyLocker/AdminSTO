# ============================================================
# CI/CD ДЛЯ ADM INSTO (GITVERSE)
# ============================================================

name: CI/CD AdminSTO

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  build:
    name: Сборка и тесты
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверить версию Java
        run: java -version

      - name: Сделать gradlew исполняемым
        run: chmod +x gradlew

      - name: Проверить Gradle
        run: ./gradlew --version

      - name: Собрать проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Запустить тесты
        # UI-тесты требуют headless-режима — без этих свойств JavaFX упадёт
        # в CI-среде без X-сервера. Свойства дублируют build.gradle, но
        # CI-процесс может игнорировать их, если не передать явно.
        run: >
          ./gradlew test --stacktrace
          -Dprism.order=sw
          -Dprism.text=t2k
          -Djavafx.headless=true
          -Dtestfx.headless=true
          -Dglass.platform=Monocle
          -Dmonocle.platform=Headless

      - name: Сохранить результаты тестов
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/test-results/test/

  package:
    name: Упаковка JAR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref.name == 'main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Сделать gradlew исполняемым
        run: chmod +x gradlew

      - name: Создать JAR
        run: ./gradlew fatJar --stacktrace

      - name: Сохранить JAR
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-JAR
          path: build/libs/*.jar

  portable:
    name: Портативная версия
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Сделать gradlew исполняемым
        run: chmod +x gradlew

      - name: Создать портативную версию
        # В build.gradle нет задачи 'dist' — используем fatJar, который
        # собирает fat JAR со всеми зависимостями (аналог portable).
        run: ./gradlew fatJar --stacktrace

      - name: Сохранить портативную версию
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-Portable
          path: build/libs/*.jar

  release:
    name: Создать релиз
    runs-on: ubuntu-latest
    needs: portable
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Скачать артефакты
        uses: actions/download-artifact@v4
        with:
          name: AdminSTO-Portable
          path: build/libs

      - name: Создать ZIP
        run: |
          cd build/libs
          zip -r ../AdminSTO-Portable.zip *.jar
          cd ..

      - name: Создать релиз
        # softprops/action-gh-release — GitHub-specific action.
        # Если Gitverse не поддерживает этот action, замените на
        # собственный скрипт через Gitverse API:
        #   curl -X POST ...
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AdminSTO-Portable.zip
          name: Релиз ${{ github.ref_name }}
          draft: false
          prerelease: false