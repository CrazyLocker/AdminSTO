# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Официальный API: https://api.gitverse.ru
# Запуск только по тегам v*
# Сборка Windows-портативки на self-hosted раннере
# ============================================================

name: AdminSTO Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Сборка и релиз
    runs-on: [windows]

    steps:
      # ==========================================
      # 1. Клонирование
      # ==========================================
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "repository: ${{ github.repository }}"
          echo "OS: ${{ runner.os }}"

      # ==========================================
      # 2. Настройка JDK 21
      # ==========================================
      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем Java
        run: java -version

      # ==========================================
      # 3. Кэширование Gradle
      # ==========================================
      - name: Кэшируем Gradle
        uses: actions/cache@v4
        id: gradle-cache
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Проверка кэша
        run: |
          if (Test-Path "~/.gradle/caches") {
            $size = (Get-ChildItem ~/.gradle/caches -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "✅ Кэш Gradle найден: $([math]::Round($size, 1)) MB"
          } else {
            Write-Host "ℹ️ Кэш Gradle не найден, будет скачан"
          }

      # ==========================================
      # 4. Сборка проекта
      # ==========================================
      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      # ==========================================
      # 5. Создание портативки
      # ==========================================
      - name: Создаём portable-версию для Windows
        shell: pwsh
        run: |
          Write-Host "=== Создание portable-версии ==="
          Write-Host "Текущая директория: $pwd"
          Write-Host "JAVA_HOME: $env:JAVA_HOME"
          
          # Проверяем наличие JAR
          if (!(Test-Path "build/libs/autoservice-admin.jar")) {
            Write-Error "JAR не найден!"
            exit 1
          }
          
          # Запускаем скрипт сборки
          & .\build-portable.ps1

      - name: Проверяем portable-версию
        run: |
          echo "=== Содержимое AdminSTO_Portable ==="
          dir AdminSTO_Portable
          echo ""
          echo "Размер папки:"
          $size = (Get-ChildItem AdminSTO_Portable -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          echo "$([math]::Round($size, 2)) MB"

      # ==========================================
      # 6. Упаковка в ZIP
      # ==========================================
      - name: Упаковываем портативку в ZIP
        run: |
          $TAG = "${{ github.ref_name }}"
          $ZIP_NAME = "AdminSTO-portable-${TAG}.zip"
          
          echo "=== Упаковка ==="
          echo "Тег: ${TAG}"
          echo "ZIP: ${ZIP_NAME}"
          
          if (!(Test-Path "AdminSTO_Portable")) {
            Write-Error "Папка AdminSTO_Portable не найдена!"
            exit 1
          }
          
          # Проверяем наличие STO.bat
          if (!(Test-Path "AdminSTO_Portable/STO.bat")) {
            Write-Error "STO.bat не найден в AdminSTO_Portable!"
            exit 1
          }
          
          # Упаковываем содержимое папки
          Compress-Archive -Path "AdminSTO_Portable\*" -DestinationPath $ZIP_NAME -Force -CompressionLevel Optimal
          
          $size = (Get-Item $ZIP_NAME).Length / 1MB
          echo "✅ ZIP создан: $([math]::Round($size, 2)) MB"
          
          echo "ZIP_FILE=${ZIP_NAME}" >> $env:GITHUB_ENV
          echo "ZIP_SIZE=$([math]::Round($size, 2)) MB" >> $env:GITHUB_ENV

      # ==========================================
      # 7. Создание релиза
      # ==========================================
      - name: Создаём релиз
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $ZIP = $env:ZIP_FILE
          $OWNER = "dez21"
          $REPO = "AdminSTO"
          
          $API_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases"
          
          Write-Host "=== Создание релиза ==="
          Write-Host "Тег: ${TAG}"
          Write-Host "ZIP: ${ZIP} ($env:ZIP_SIZE)"
          
          if (!(Test-Path $ZIP)) {
            Write-Error "ZIP не найден: $ZIP"
            exit 1
          }
          
          # Создаём релиз
          $body = @{
            tag_name = $TAG
            name = "AdminSTO ${TAG}"
            body = "Автономная версия AdminSTO ${TAG}"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json -Depth 10
          
          Write-Host "Отправка запроса к API..."
          
          try {
            $response = Invoke-RestMethod -Uri $API_URL -Method Post `
              -Headers @{
                "Authorization" = "Bearer $env:SECRETTOKEN"
                "Accept" = "application/vnd.gitverse.object+json;version=1"
                "Content-Type" = "application/json"
              } `
              -Body $body
          } catch {
            Write-Error "Ошибка API: $_"
            Write-Error "Ответ: $($_.Exception.Response)"
            exit 1
          }
          
          Write-Host "✅ Релиз создан!"
          Write-Host "ID: $($response.id)"
          Write-Host "URL: $($response.html_url)"
          
          $releaseId = $response.id
          
          # Загружаем ZIP
          $ASSET_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases/${releaseId}/assets"
          
          Write-Host ""
          Write-Host "Загрузка ZIP ($env:ZIP_SIZE)..."
          
          $file = Get-Item $ZIP
          $multipartContent = [System.Net.Http.MultipartFormDataContent]::new()
          $fileStream = [System.IO.FileStream]::new($file.FullName, [System.IO.FileMode]::Open)
          $fileContent = [System.Net.Http.StreamContent]::new($fileStream)
          $multipartContent.Add($fileContent, "file", $file.Name)
          
          $headers = @{
            "Authorization" = "Bearer $env:SECRETTOKEN"
            "Accept" = "application/vnd.gitverse.object+json;version=1"
          }
          
          try {
            $uploadResponse = Invoke-RestMethod -Uri $ASSET_URL -Method Post `
              -Headers $headers `
              -Body $multipartContent
          
            Write-Host "✅ ZIP загружен!"
            Write-Host "Ассет ID: $($uploadResponse.id)"
          } catch {
            Write-Error "Ошибка загрузки ZIP: $_"
            exit 1
          } finally {
            $fileStream.Dispose()
            $multipartContent.Dispose()
          }
          
          Write-Host ""
          Write-Host "=================================================="
          Write-Host "✅ Релиз готов!"
          Write-Host "🔗 https://gitverse.ru/${OWNER}/${REPO}/releases/tag/${TAG}"
          Write-Host "=================================================="

      # ==========================================
      # 8. Информация о завершении
      # ==========================================
      - name: Завершение сборки
        run: |
          Write-Host "=== Сборка завершена ==="
          Write-Host "Ветка: ${{ github.ref_name }}"
          if ("${{ startsWith(github.ref, 'refs/tags/v') }}" -eq "true") {
            Write-Host "✅ Релиз создан!"
          } else {
            Write-Host "ℹ️ Обычная сборка (без релиза)"
          }