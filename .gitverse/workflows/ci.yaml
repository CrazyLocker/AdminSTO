# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Официальный API: https://api.gitverse.ru
# Запуск только по тегам v*
# Сборка Windows-портативки на self-hosted раннере
# ============================================================

name: AdminSTO Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Сборка и релиз
    runs-on: [self-hosted, windows]

    steps:
      # ==========================================
      # 1. Клонирование
      # ==========================================
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "repository: ${{ github.repository }}"

      # ==========================================
      # 2. Настройка JDK 21
      # ==========================================
      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем Java
        run: java -version

      # ==========================================
      # 3. Кэширование Gradle
      # ==========================================
      - name: Кэшируем Gradle
        uses: actions/cache@v4
        id: gradle-cache
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ==========================================
      # 4. Сборка проекта
      # ==========================================
      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      # ==========================================
      # 5. Создание портативки
      # ==========================================
      - name: Создаём portable-версию
        shell: pwsh
        run: |
          Write-Host "=== Создание portable-версии ==="
          if (!(Test-Path "build/libs/autoservice-admin.jar")) {
            Write-Error "JAR не найден!"
            exit 1
          }
          & .\build-portable.ps1

      - name: Проверяем portable-версию
        run: |
          echo "=== Содержимое AdminSTO_Portable ==="
          dir AdminSTO_Portable
          $size = (Get-ChildItem AdminSTO_Portable -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          echo "Размер: $([math]::Round($size, 2)) MB"

      # ==========================================
      # 6. Упаковка в ZIP
      # ==========================================
      - name: Упаковываем портативку в ZIP
        run: |
          $TAG = "${{ github.ref_name }}"
          $ZIP_NAME = "AdminSTO-portable-${TAG}.zip"
          
          echo "=== Упаковка ==="
          if (!(Test-Path "AdminSTO_Portable")) {
            Write-Error "Папка AdminSTO_Portable не найдена!"
            exit 1
          }
          
          Compress-Archive -Path "AdminSTO_Portable\*" -DestinationPath $ZIP_NAME -Force -CompressionLevel Optimal
          $size = (Get-Item $ZIP_NAME).Length / 1MB
          echo "✅ ZIP создан: $([math]::Round($size, 2)) MB"
          echo "ZIP_FILE=${ZIP_NAME}" >> $env:GITHUB_ENV
          echo "ZIP_SIZE=$([math]::Round($size, 2)) MB" >> $env:GITHUB_ENV

      # ==========================================
      # 7. Создание релиза и загрузка ZIP
      # ==========================================
      - name: Создаём релиз
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $ZIP = $env:ZIP_FILE
          $OWNER = "dez21"
          $REPO = "AdminSTO"
          
          $API_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases"
          
          Write-Host "=== Создание релиза ==="
          Write-Host "Тег: ${TAG}"
          
          $body = @{
            tag_name = $TAG
            name = "AdminSTO ${TAG}"
            body = "Автономная версия AdminSTO ${TAG}"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json -Depth 10
          
          $response = Invoke-RestMethod -Uri $API_URL -Method Post `
            -Headers @{
              "Authorization" = "Bearer $env:SECRETTOKEN"
              "Accept" = "application/vnd.gitverse.object+json;version=1"
              "Content-Type" = "application/json"
            } `
            -Body $body
          
          Write-Host "✅ Релиз создан!"
          Write-Host "ID: $($response.id)"
          Write-Host "URL: $($response.html_url)"
          
          $RELEASE_ID = $response.id
          echo "RELEASE_ID=${RELEASE_ID}" >> $env:GITHUB_ENV
          echo "RELEASE_URL=$($response.html_url)" >> $env:GITHUB_ENV

      # ==========================================
      # 8. Загрузка ZIP с повторными попытками
      # ==========================================
      - name: Загружаем ZIP с повторными попытками
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $ZIP = $env:ZIP_FILE
          $OWNER = "dez21"
          $REPO = "AdminSTO"
          $RELEASE_ID = $env:RELEASE_ID
          
          Write-Host "=== Загрузка ZIP с повторными попытками ==="
          Write-Host "Тег: ${TAG}"
          Write-Host "Файл: ${ZIP} ($env:ZIP_SIZE)"
          Write-Host "ID релиза: ${RELEASE_ID}"
          
          if (!(Test-Path $ZIP)) {
            Write-Error "ZIP не найден: $ZIP"
            exit 1
          }
          
          $ASSET_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/assets"
          
          $maxRetries = 5
          $retryCount = 0
          $success = $false
          
          while ($retryCount -lt $maxRetries -and -not $success) {
            $retryCount++
            Write-Host "Попытка ${retryCount}/${maxRetries}..."
          
            try {
              $file = Get-Item $ZIP
              $multipartContent = [System.Net.Http.MultipartFormDataContent]::new()
              $fileStream = [System.IO.FileStream]::new($file.FullName, [System.IO.FileMode]::Open)
              $fileContent = [System.Net.Http.StreamContent]::new($fileStream)
              $multipartContent.Add($fileContent, "file", $file.Name)
          
              $headers = @{
                "Authorization" = "Bearer $env:SECRETTOKEN"
                "Accept" = "application/vnd.gitverse.object+json;version=1"
              }
          
              $uploadResponse = Invoke-RestMethod -Uri $ASSET_URL -Method Post `
                -Headers $headers `
                -Body $multipartContent `
                -TimeoutSec 120
          
              $fileStream.Dispose()
              $multipartContent.Dispose()
          
              Write-Host "✅ ZIP загружен успешно!"
              Write-Host "ID ассета: $($uploadResponse.id)"
              $success = $true
          
            } catch {
              Write-Host "⚠️ Попытка ${retryCount} не удалась: $_"
          
              if ($retryCount -lt $maxRetries) {
                $waitTime = $retryCount * 5
                Write-Host "Ожидание ${waitTime} секунд перед повторной попыткой..."
                Start-Sleep -Seconds $waitTime
              }
            }
          }
          
          if (-not $success) {
            Write-Error "Не удалось загрузить ZIP после ${maxRetries} попыток"
            Write-Host ""
            Write-Host "⚠️ Релиз создан, но файл не загружен."
            Write-Host "Загрузите файл вручную на странице релиза:"
            Write-Host "$env:RELEASE_URL"
            exit 1
          }
          
          Write-Host ""
          Write-Host "✅ Релиз готов!"
          Write-Host "🔗 $env:RELEASE_URL"

      # ==========================================
      # 9. Информация о завершении
      # ==========================================
      - name: Завершение сборки
        run: |
          Write-Host "=== Сборка завершена ==="
          Write-Host "Тег: ${{ github.ref_name }}"
          if ($env:RELEASE_URL) {
            Write-Host "✅ Релиз создан: $env:RELEASE_URL"
          } else {
            Write-Host "❌ Релиз не создан!"
            exit 1
          }