# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Официальный API: https://api.gitverse.ru
# Запуск только по тегам v*
# ============================================================

name: AdminSTO Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Сборка и релиз
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # 1. Клонирование
      # ==========================================
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "repository: ${{ github.repository }}"

      # ==========================================
      # 2. Настройка JDK
      # ==========================================
      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Делаем gradlew исполняемым
        run: chmod +x gradlew

      # ==========================================
      # 3. Кэширование Gradle
      # ==========================================
      - name: Кэшируем Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ==========================================
      # 4. Сборка проекта
      # ==========================================
      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      # ==========================================
      # 5. Создание портативной версии
      # ==========================================
      - name: Создаём portable-версию
        run: |
          chmod +x build-portable.sh
          ./build-portable.sh

      - name: Проверяем portable-версию
        run: |
          echo "=== Содержимое AdminSTO_Portable ==="
          ls -la AdminSTO_Portable/
          echo "Размер:"
          du -sh AdminSTO_Portable/

      # ==========================================
      # 6. Упаковка портативной версии в ZIP
      # ==========================================
      - name: Упаковываем портативку в ZIP
        run: |
          TAG="${{ github.ref_name }}"
          ZIP_NAME="AdminSTO-portable-${TAG}.zip"
          
          echo "=== Упаковка портативной версии ==="
          echo "Тег: ${TAG}"
          echo "ZIP: ${ZIP_NAME}"
          
          # Проверяем, что папка существует
          if [ ! -d "AdminSTO_Portable" ]; then
            echo "❌ Папка AdminSTO_Portable не найдена!"
            exit 1
          fi
          
          # Упаковываем содержимое папки (без самой папки)
          cd AdminSTO_Portable
          zip -r "../${ZIP_NAME}" .
          cd ..
          
          echo "✅ ZIP создан: $(ls -lh ${ZIP_NAME})"
          
          # Сохраняем имя файла для следующих шагов
          echo "ZIP_FILE=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_SIZE=$(du -h ${ZIP_NAME} | cut -f1)" >> $GITHUB_ENV
          
          # Проверяем содержимое ZIP
          echo "=== Содержимое ZIP ==="
          unzip -l "${ZIP_NAME}" | head -20

      # ==========================================
      # 7. Создание релиза через API GitVerse
      # ==========================================
      - name: Создаём релиз
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        run: |
          set -e

          TAG="${{ github.ref_name }}"
          ZIP="${ZIP_FILE}"
          OWNER="dez21"
          REPO="AdminSTO"

          API_URL="https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases"

          echo "=== Создание релиза ==="
          echo "Тег: ${TAG}"
          echo "ZIP: ${ZIP} (${ZIP_SIZE})"

          if [ ! -f "${ZIP}" ]; then
            echo "❌ ZIP не найден!"
            exit 1
          fi

          # Создаём релиз
          RESPONSE=$(curl -s -X POST "${API_URL}" \
            -H "Authorization: Bearer ${SECRETTOKEN}" \
            -H "Accept: application/vnd.gitverse.object+json;version=1" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"AdminSTO ${TAG}\",
              \"body\": \"Автономная версия AdminSTO ${TAG}\",
              \"draft\": false,
              \"prerelease\": false
            }")

          echo "Ответ API: ${RESPONSE}"

          if echo "${RESPONSE}" | grep -q '"error"'; then
            echo "❌ Ошибка: ${RESPONSE}"
            exit 1
          fi

          RELEASE_ID=$(echo "${RESPONSE}" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')

          if [ -z "${RELEASE_ID}" ]; then
            echo "❌ Не удалось получить ID релиза!"
            exit 1
          fi

          echo "✅ Релиз создан! ID: ${RELEASE_ID}"

          # Загружаем ZIP
          ASSET_URL="https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/assets"

          echo "Загрузка ZIP..."
          UPLOAD_RESPONSE=$(curl -s -X POST "${ASSET_URL}" \
            -H "Authorization: Bearer ${SECRETTOKEN}" \
            -H "Accept: application/vnd.gitverse.object+json;version=1" \
            -F "file=@${ZIP}")

          echo "Загрузка: ${UPLOAD_RESPONSE}"

          if echo "${UPLOAD_RESPONSE}" | grep -q '"id"'; then
            echo "✅ ZIP загружен!"
          else
            echo "⚠️ Ошибок нет, но ID не получен"
          fi

          echo ""
          echo "✅ Релиз готов!"
          echo "🔗 https://gitverse.ru/${OWNER}/${REPO}/releases/tag/${TAG}"