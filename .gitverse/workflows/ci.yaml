# ============================================================
# CI/CD ДЛЯ ADM INSTO (GITVERSE)
# ============================================================

name: CI/CD AdminSTO

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  release:
    types:
      - published

jobs:
  # ====== 1. СБОРКА И ТЕСТЫ ======
  build:
    name: Сборка и тесты
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Сделать gradlew исполняемым
        run: chmod +x gradlew

      - name: Собрать проект
        run: ./gradlew clean compileJava

      - name: Запустить тесты
        run: ./gradlew test

      - name: Сохранить результаты тестов
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/test-results/test/

  # ====== 2. УПАКОВКА ======
  package:
    name: Упаковка JAR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Сделать gradlew исполняемым
        run: chmod +x gradlew

      - name: Создать JAR
        run: ./gradlew fatJar

      - name: Сохранить JAR
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-JAR
          path: build/libs/*.jar

  # ====== 3. ПОРТАТИВНАЯ ВЕРСИЯ ======
  portable:
    name: Портативная версия
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Сделать gradlew исполняемым
        run: chmod +x gradlew

      - name: Создать портативную версию
        run: ./gradlew dist

      - name: Сохранить портативную версию
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-Portable
          path: dist/

  # ====== 4. РЕЛИЗ ======
  release:
    name: Создать релиз
    runs-on: ubuntu-latest
    needs: portable
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Скачать артефакты
        uses: actions/download-artifact@v4
        with:
          name: AdminSTO-Portable
          path: dist

      - name: Создать ZIP
        run: |
          cd dist
          zip -r ../AdminSTO-Portable.zip .
          cd ..

      - name: Создать релиз
        uses: softprops/action-gh-release@v1
        with:
          files: |
            AdminSTO-Portable.zip
          name: Релиз ${{ github.ref_name }}
          draft: false
          prerelease: false