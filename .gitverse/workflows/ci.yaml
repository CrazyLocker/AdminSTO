# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Официальная документация: https://gitverse.ru/docs/developers/public-api/releases/
# Запуск только по тегам v*
# Сборка портативки и загрузка ZIP в релиз через API ассетов
# ============================================================

name: AdminSTO Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Сборка и релиз
    runs-on: [windows]

    steps:
      # ==========================================
      # 1. Клонирование
      # ==========================================
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "repository: ${{ github.repository }}"

      # ==========================================
      # 2. Настройка JDK 21
      # ==========================================
      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем Java
        run: java -version

      # ==========================================
      # 3. Кэширование Gradle
      # ==========================================
      - name: Кэшируем Gradle
        uses: actions/cache@v4
        id: gradle-cache
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ==========================================
      # 4. Сборка проекта
      # ==========================================
      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      # ==========================================
      # 5. Создание портативки
      # ==========================================
      - name: Создаём portable-версию
        shell: pwsh
        run: |
          Write-Host "=== Создание portable-версии ==="
          if (!(Test-Path "build/libs/autoservice-admin.jar")) {
            Write-Error "JAR не найден!"
            exit 1
          }
          & .\build-portable.ps1

      - name: Проверяем portable-версию
        shell: pwsh
        run: |
          Write-Host "=== Содержимое AdminSTO_Portable ==="
          Get-ChildItem AdminSTO_Portable
          $size = (Get-ChildItem AdminSTO_Portable -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Размер: $([math]::Round($size, 2)) MB"

      # ==========================================
      # 6. Упаковка портативки в ZIP
      # ==========================================
      - name: Упаковываем портативку в ZIP
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $ZIP_NAME = "AdminSTO-portable-${TAG}.zip"
          
          Write-Host "=== Упаковка портативки ==="
          if (!(Test-Path "AdminSTO_Portable")) {
            Write-Error "Папка AdminSTO_Portable не найдена!"
            exit 1
          }
          
          # Упаковываем содержимое папки (без самой папки)
          Compress-Archive -Path "AdminSTO_Portable\*" -DestinationPath $ZIP_NAME -Force -CompressionLevel Optimal
          $size = (Get-Item $ZIP_NAME).Length / 1MB
          Write-Host "✅ ZIP создан: $ZIP_NAME ($([math]::Round($size, 2)) MB)"
          
          # Сохраняем имя файла и размер в переменные окружения
          Write-Output "ZIP_FILE=$ZIP_NAME" >> $env:GITHUB_ENV
          Write-Output "ZIP_SIZE=$([math]::Round($size, 2)) MB" >> $env:GITHUB_ENV

      # ==========================================
      # 7. СОЗДАЁМ РЕЛИЗ
      # POST /repos/{owner}/{repo}/releases
      # ==========================================
      - name: Создаём релиз
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $OWNER = "dez21"
          $REPO = "AdminSTO"
          
          $API_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases"
          
          Write-Host "=== Создание релиза ==="
          Write-Host "Тег: ${TAG}"
          Write-Host "API URL: ${API_URL}"
          
          # Формируем тело запроса согласно документации
          $body = @{
            tag_name = $TAG
            name = "AdminSTO ${TAG}"
            body = "Автономная версия AdminSTO ${TAG}"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json -Depth 10
          
          try {
            $response = Invoke-RestMethod -Uri $API_URL -Method Post `
              -Headers @{
                "Authorization" = "Bearer $env:SECRETTOKEN"
                "Accept" = "application/vnd.gitverse.object+json;version=1"
                "Content-Type" = "application/json"
              } `
              -Body $body
          
            Write-Host ""
            Write-Host "✅ Релиз создан!"
            Write-Host "ID: $($response.id)"
            Write-Host "URL: $($response.html_url)"
          
            $RELEASE_ID = $response.id
            Write-Output "RELEASE_ID=$RELEASE_ID" >> $env:GITHUB_ENV
            Write-Output "RELEASE_URL=$($response.html_url)" >> $env:GITHUB_ENV
          
          } catch {
            Write-Error "❌ Ошибка создания релиза!"
            Write-Error "Статус: $($_.Exception.Response.StatusCode.value__)"
            exit 1
          }

      # ==========================================
      # 8. ЗАГРУЖАЕМ ZIP КАК АССЕТ В РЕЛИЗ
      # POST /repos/{owner}/{repo}/releases/{release_id}/assets
      # Документация: https://gitverse.ru/docs/developers/public-api/releases/#9-post-repos-owner-repo-releases-release-id-assets
      # ==========================================
      - name: Загружаем ZIP как ассет
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        shell: pwsh
        run: |
          $ZIP = $env:ZIP_FILE
          $OWNER = "dez21"
          $REPO = "AdminSTO"
          $RELEASE_ID = $env:RELEASE_ID
          
          $ASSET_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/assets"
          
          Write-Host ""
          Write-Host "=== Загрузка ZIP как ассета ==="
          Write-Host "Файл: ${ZIP} ($env:ZIP_SIZE)"
          Write-Host "URL: ${ASSET_URL}"
          
          if (!(Test-Path $ZIP)) {
            Write-Error "ZIP не найден: $ZIP"
            exit 1
          }
          
          try {
            # Подготавливаем файл для загрузки
            $file = Get-Item $ZIP
            $multipartContent = [System.Net.Http.MultipartFormDataContent]::new()
            $fileStream = [System.IO.FileStream]::new($file.FullName, [System.IO.FileMode]::Open)
            $fileContent = [System.Net.Http.StreamContent]::new($fileStream)
            $multipartContent.Add($fileContent, "file", $file.Name)
          
            # Отправляем запрос на загрузку ассета
            $uploadResponse = Invoke-RestMethod -Uri $ASSET_URL -Method Post `
              -Headers @{
                "Authorization" = "Bearer $env:SECRETTOKEN"
                "Accept" = "application/vnd.gitverse.object+json;version=1"
              } `
              -Body $multipartContent `
              -TimeoutSec 300
          
            # Освобождаем ресурсы
            $fileStream.Dispose()
            $multipartContent.Dispose()
          
            Write-Host ""
            Write-Host "✅ ZIP загружен как ассет!"
            Write-Host "ID ассета: $($uploadResponse.id)"
            Write-Host "Имя: $($uploadResponse.name)"
            Write-Host "Размер: $($uploadResponse.size) байт"
            Write-Host "URL: $($uploadResponse.url)"
          
          } catch {
            Write-Error "❌ Ошибка загрузки ZIP!"
            Write-Error "Статус: $($_.Exception.Response.StatusCode.value__)"
          
            # Если ошибка 500 - пробуем через curl как запасной вариант
            Write-Host ""
            Write-Host "Пробуем загрузить через curl..."
          
            $curlResult = curl.exe -X POST $ASSET_URL `
              -H "Authorization: Bearer $env:SECRETTOKEN" `
              -H "Accept: application/vnd.gitverse.object+json;version=1" `
              -F "file=@$ZIP" `
              --max-time 120 `
              -w "%{http_code}" `
              -o "upload_response.json" `
              -s
          
            if ($curlResult -eq "201") {
              Write-Host "✅ ZIP загружен через curl!"
              Get-Content upload_response.json
            } else {
              Write-Error "Не удалось загрузить ZIP (HTTP $curlResult)"
              exit 1
            }
          }

      # ==========================================
      # 9. Информация о завершении
      # ==========================================
      - name: Завершение сборки
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "=================================================="
          Write-Host "  ✅ СБОРКА И РЕЛИЗ УСПЕШНО ЗАВЕРШЕНЫ!"
          Write-Host "=================================================="
          Write-Host ""
          Write-Host "🔗 Релиз: $env:RELEASE_URL"
          Write-Host "📦 ZIP загружен в релиз как ассет"
          Write-Host ""
          Write-Host "✅ Готово!"