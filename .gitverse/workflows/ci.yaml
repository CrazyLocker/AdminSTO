# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Официальная документация: https://gitverse.ru/docs/developers/public-api/releases/
# Запуск только по тегам v*
# Сборка портативки, сохранение на диск, создание релиза (без ассетов)
# ============================================================

name: AdminSTO Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Сборка и релиз
    runs-on: [windows]

    steps:
      # ==========================================
      # 1. Клонирование
      # ==========================================
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "repository: ${{ github.repository }}"

      # ==========================================
      # 2. Настройка JDK 21
      # ==========================================
      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем Java
        run: java -version

      # ==========================================
      # 3. Кэширование Gradle
      # ==========================================
      - name: Кэшируем Gradle
        uses: actions/cache@v4
        id: gradle-cache
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ==========================================
      # 4. Сборка проекта
      # ==========================================
      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      # ==========================================
      # 5. Создание портативки
      # ==========================================
      - name: Создаём portable-версию
        shell: pwsh
        run: |
          Write-Host "=== Создание portable-версии ==="
          if (!(Test-Path "build/libs/autoservice-admin.jar")) {
            Write-Error "JAR не найден!"
            exit 1
          }
          & .\build-portable.ps1

      - name: Проверяем portable-версию
        shell: pwsh
        run: |
          Write-Host "=== Содержимое AdminSTO_Portable ==="
          Get-ChildItem AdminSTO_Portable
          $size = (Get-ChildItem AdminSTO_Portable -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Размер: $([math]::Round($size, 2)) MB"

      # ==========================================
      # 6. СОХРАНЯЕМ ПОРТАТИВКУ НА ДИСК РАННЕРА
      # ==========================================
      - name: Сохраняем портативку на диск
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $SOURCE = "AdminSTO_Portable"
          $DEST = "E:\Alecsey\Java Projects for QA\AdminSTO-Releases\${TAG}"
          
          Write-Host "=== Сохранение портативной версии ==="
          Write-Host "Тег: ${TAG}"
          Write-Host "Источник: ${SOURCE}"
          Write-Host "Назначение: ${DEST}"
          
          # Создаём папку для всех релизов
          if (!(Test-Path "E:\Alecsey\Java Projects for QA\AdminSTO-Releases")) {
            New-Item -ItemType Directory -Path "E:\Alecsey\Java Projects for QA\AdminSTO-Releases" -Force
          }
          
          # Копируем папку с портативкой
          if (Test-Path $DEST) {
            Remove-Item $DEST -Recurse -Force
          }
          Copy-Item -Path $SOURCE -Destination $DEST -Recurse -Force
          
          Write-Host ""
          Write-Host "✅ Портативка сохранена на диск!"
          Write-Host "📁 Папка: ${DEST}"
          
          # Сохраняем путь для информации
          Write-Output "PORTABLE_PATH=${DEST}" >> $env:GITHUB_ENV

      # ==========================================
      # 7. СОЗДАЁМ РЕЛИЗ (БЕЗ ЗАГРУЗКИ АССЕТОВ)
      # Используем официальный API: POST /repos/{owner}/{repo}/releases
      # Документация: https://gitverse.ru/docs/developers/public-api/releases/#2-post-repos-owner-repo-releases
      # ==========================================
      - name: Создаём релиз через API
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $OWNER = "dez21"
          $REPO = "AdminSTO"
          
          $API_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases"
          
          Write-Host "=== Создание релиза через официальный API ==="
          Write-Host "Тег: ${TAG}"
          Write-Host "API URL: ${API_URL}"
          
          # Формируем тело запроса согласно документации
          $body = @{
            tag_name = $TAG
            name = "AdminSTO ${TAG}"
            body = "Автономная версия AdminSTO ${TAG}`n`n📁 Портативная версия сохранена на диске раннера: E:\Alecsey\Java Projects for QA\AdminSTO-Releases\${TAG}"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json -Depth 10
          
          Write-Host "Тело запроса: $body"
          
          # Отправляем запрос
          try {
            $response = Invoke-RestMethod -Uri $API_URL -Method Post `
              -Headers @{
                "Authorization" = "Bearer $env:SECRETTOKEN"
                "Accept" = "application/vnd.gitverse.object+json;version=1"
                "Content-Type" = "application/json"
              } `
              -Body $body
          
            Write-Host ""
            Write-Host "✅ Релиз успешно создан!"
            Write-Host "ID: $($response.id)"
            Write-Host "URL: $($response.html_url)"
            Write-Host "Тег: $($response.tag_name)"
            Write-Host "Название: $($response.name)"
          
            Write-Output "RELEASE_URL=$($response.html_url)" >> $env:GITHUB_ENV
            Write-Output "RELEASE_ID=$($response.id)" >> $env:GITHUB_ENV
          
          } catch {
            Write-Error "❌ Ошибка создания релиза!"
            Write-Error "Статус: $($_.Exception.Response.StatusCode.value__)"
            Write-Error "Ответ: $($_.Exception.Response)"
          
            # Показываем детали ошибки
            if ($_.Exception.Response) {
              $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
              $reader.BaseStream.Position = 0
              $reader.DiscardBufferedData()
              $responseBody = $reader.ReadToEnd()
              Write-Error "Детали: $responseBody"
            }
          
            exit 1
          }

      # ==========================================
      # 8. Информация о завершении
      # ==========================================
      - name: Завершение сборки
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "=================================================="
          Write-Host "  ✅ СБОРКА И РЕЛИЗ УСПЕШНО ЗАВЕРШЕНЫ!"
          Write-Host "=================================================="
          Write-Host ""
          Write-Host "🔗 Релиз: $env:RELEASE_URL"
          Write-Host "📁 Портативка сохранена: $env:PORTABLE_PATH"
          Write-Host ""
          Write-Host "📌 Если нужно загрузить файлы в релиз:"
          Write-Host "   Используйте POST /repos/{owner}/{repo}/releases/{release_id}/assets"
          Write-Host "   Документация: https://gitverse.ru/docs/developers/public-api/releases/#9-post-repos-owner-repo-releases-release-id-assets"