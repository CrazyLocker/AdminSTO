# ============================================================
# CI/CD ДЛЯ AdminSTO (GitVerse)
# Запуск только по тегам v*
# ============================================================

name: AdminSTO Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Сборка и релиз
    runs-on: [windows]

    steps:
      # ==========================================
      # 1. Клонирование
      # ==========================================
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Отладка
        run: |
          echo "ref_name: ${{ github.ref_name }}"
          echo "repository: ${{ github.repository }}"

      # ==========================================
      # 2. Настройка JDK 21
      # ==========================================
      - name: Устанавливаем JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Проверяем Java
        run: java -version

      # ==========================================
      # 3. Кэширование Gradle
      # ==========================================
      - name: Кэшируем Gradle
        uses: actions/cache@v4
        id: gradle-cache
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ==========================================
      # 4. Сборка проекта
      # ==========================================
      - name: Собираем проект
        run: ./gradlew clean compileJava --stacktrace

      - name: Создаём fat JAR
        run: ./gradlew fatJar --stacktrace

      # ==========================================
      # 5. Создание портативки
      # ==========================================
      - name: Создаём portable-версию
        shell: pwsh
        run: |
          Write-Host "=== Создание portable-версии ==="
          if (!(Test-Path "build/libs/autoservice-admin.jar")) {
            Write-Error "JAR не найден!"
            exit 1
          }
          & .\build-portable.ps1

      - name: Проверяем portable-версию
        shell: pwsh
        run: |
          Write-Host "=== Содержимое AdminSTO_Portable ==="
          Get-ChildItem AdminSTO_Portable
          $size = (Get-ChildItem AdminSTO_Portable -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Размер: $([math]::Round($size, 2)) MB"

      # ==========================================
      # 6. КОПИРУЕМ ПАПКУ КАК АРТЕФАКТ (БЕЗ УПАКОВКИ)
      # ==========================================
      - name: Копируем портативку как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: AdminSTO-Portable-${{ github.ref_name }}
          path: AdminSTO_Portable/
          retention-days: 30

      # ==========================================
      # 7. Создание релиза (без ZIP)
      # ==========================================
      - name: Создаём релиз
        env:
          SECRETTOKEN: ${{ secrets.SECRETTOKEN }}
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $OWNER = "dez21"
          $REPO = "AdminSTO"
          
          $API_URL = "https://api.gitverse.ru/repos/${OWNER}/${REPO}/releases"
          
          Write-Host "=== Создание релиза ==="
          Write-Host "Тег: ${TAG}"
          
          $body = @{
            tag_name = $TAG
            name = "AdminSTO ${TAG}"
            body = "Автономная версия AdminSTO ${TAG}`n`n📦 Папка с портативной версией сохранена как артефакт CI.`nСкачайте её из вкладки Actions → Artifacts."
            draft = $false
            prerelease = $false
          } | ConvertTo-Json -Depth 10
          
          $response = Invoke-RestMethod -Uri $API_URL -Method Post `
            -Headers @{
              "Authorization" = "Bearer $env:SECRETTOKEN"
              "Accept" = "application/vnd.gitverse.object+json;version=1"
              "Content-Type" = "application/json"
            } `
            -Body $body
          
          Write-Host "✅ Релиз создан!"
          Write-Host "ID: $($response.id)"
          Write-Host "URL: $($response.html_url)"
          
          Write-Output "RELEASE_URL=$($response.html_url)" >> $env:GITHUB_ENV

      # ==========================================
      # 8. Информация о завершении
      # ==========================================
      - name: Завершение сборки
        shell: pwsh
        run: |
          Write-Host "=== Сборка завершена ==="
          Write-Host "Тег: ${{ github.ref_name }}"
          Write-Host ""
          Write-Host "✅ Релиз создан: $env:RELEASE_URL"
          Write-Host ""
          Write-Host "📦 Портативная версия сохранена как артефакт CI:"
          Write-Host "   1. Перейдите во вкладку Actions"
          Write-Host "   2. Выберите этот запуск"
          Write-Host "   3. Скачайте артефакт AdminSTO-Portable-${{ github.ref_name }}"
          Write-Host ""
          Write-Host "▶️  Распакуйте папку и запустите STO.bat"